<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideUI</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div class="sidebar-app">
    <!-- Header Bar -->
    <header class="header-bar">
      <div class="header-left">
        <button id="menuBtn" class="header-btn menu-btn" title="Menu">☰</button>
        <h1 class="header-title">SideUI</h1>
      </div>
      <div class="header-right">
        <button id="pinBtn" class="header-btn" title="Pin">📌</button>
        <button id="closeBtn" class="header-btn" title="Close">✕</button>
      </div>
    </header>

    <!-- Navigation Bar -->
    <div class="navbar">
      <button id="homeBtn" class="nav-home-btn" title="Home">🏠</button>
      <input
        type="text"
        id="navSearchInput"
        placeholder="Search"
        class="nav-search"
      />
      <button id="goBtn" class="nav-go-btn">Go</button>
      <button id="themeToggle" class="nav-theme-btn" title="Theme">🌙</button>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
      <!-- Left Sidebar (Favorites) -->
      <aside class="favorites-sidebar">
        <div class="sidebar-header">Favorites</div>

        <!-- Quick Add -->
        <div class="quick-add-box">
          <input
            type="url"
            id="quickUrlInput"
            placeholder="Add URL..."
            class="quick-input"
          />
          <button id="quickAddBtn" class="quick-btn">Add</button>
        </div>

        <!-- Stats -->
        <div class="sidebar-stats">
          <span id="countDisplay">No favorites</span>
        </div>

        <!-- Favorites List -->
        <div id="favoritesList" class="favorites-list"></div>

        <!-- Empty State -->
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">⭐</div>
          <div class="empty-text">No favorites yet</div>
        </div>
      </aside>

      <!-- Main Viewer (Center) -->
      <main class="viewer-main">
        <div class="viewer-wrapper">
          <iframe id="contentFrame" class="content-iframe"></iframe>
          <div id="viewerPlaceholder" class="placeholder-box">
            <div class="placeholder-content">
              <div class="placeholder-icon">🔗</div>
              <div class="placeholder-text">Drag and drop your link or text here</div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
