<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SideUI</title>
  <link rel="stylesheet" href="sidebar.css" />
</head>
<body>
  <div class="sidebar-app">
    <!-- Navigation Bar -->
    <nav class="navbar">
      <div class="navbar-left">
        <button id="homeBtn" class="nav-btn" title="Home">🏠</button>
        <button id="backBtn" class="nav-btn" title="Back" disabled>←</button>
        <button id="forwardBtn" class="nav-btn" title="Forward" disabled>→</button>
      </div>
      
      <div class="navbar-center">
        <input
          type="text"
          id="navSearchInput"
          placeholder="Search or paste URL..."
          class="nav-search"
        />
      </div>

      <div class="navbar-right">
        <button id="settingsBtn" class="nav-btn" title="Settings">⚙️</button>
        <button id="themeToggle" class="nav-btn" title="Toggle theme">🌙</button>
      </div>
    </nav>

    <!-- Tabs Panel -->
    <div class="tabs-panel">
      <div id="tabsList" class="tabs-container"></div>
      <button id="addTabBtn" class="add-tab-btn" title="Add new tab">+</button>
    </div>

    <!-- Content Area -->
    <div class="content-area">
      <!-- Favorites Sidebar (Left) -->
      <aside class="favorites-sidebar">
        <div class="sidebar-title">Favorites</div>
        <div class="sidebar-stats">
          <span id="countDisplay">No favorites</span>
        </div>

        <!-- Quick Add -->
        <div class="quick-add-section">
          <input
            type="url"
            id="quickUrlInput"
            placeholder="Add URL..."
            class="quick-input"
          />
          <button id="quickAddBtn" class="quick-btn">Add</button>
        </div>

        <!-- Favorites List -->
        <div id="favoritesList" class="favorites-list"></div>
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">⭐</div>
          <div class="empty-text">No favorites yet</div>
        </div>
      </aside>

      <!-- Main Viewer Area (Right) -->
      <main class="viewer-area">
        <div class="viewer-header">
          <h2 id="viewerTitle" class="viewer-title">Welcome to SideUI</h2>
          <button id="closeTabBtn" class="close-btn" title="Close tab">✕</button>
        </div>
        <div class="viewer-content">
          <iframe id="contentFrame" class="content-iframe"></iframe>
          <div id="viewerPlaceholder" class="viewer-placeholder">
            <div class="welcome-icon">🌐</div>
            <h1>Welcome to SideUI</h1>
            <p>Open a favorite or search to get started</p>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
